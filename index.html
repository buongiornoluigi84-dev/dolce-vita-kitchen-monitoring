<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1e2340">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon_192.png">
<title>Dolce Vita — Kitchen Monitoring</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#eeede9;
  --text:#1a1a1a;--text2:#6b7280;--text3:#9ca3af;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --success:#16a34a;--success-bg:#f0fdf4;--success-border:#bbf7d0;
  --danger:#dc2626;--danger-bg:#fef2f2;--danger-border:#fecaca;
  --warning:#d97706;--warning-bg:#fffbeb;--warning-border:#fde68a;
  --navy:#1e2340;--r:8px;--rl:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:14px;min-height:100vh}
#pin-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px}
.pin-logo{font-size:24px;font-weight:600;letter-spacing:-.5px}
.pin-logo span{color:var(--text2);font-weight:400}
.pin-dots{display:flex;gap:18px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border2);transition:background .15s}
.pin-dot.filled{background:var(--text);border-color:var(--text)}
.pin-error{color:var(--danger);font-size:13px;min-height:18px;text-align:center}
.pin-pad{display:grid;grid-template-columns:repeat(3,76px);gap:10px}
.pin-btn{height:76px;border-radius:var(--rl);border:.5px solid var(--border);background:var(--bg2);font-size:24px;font-weight:300;cursor:pointer;color:var(--text);transition:background .1s,transform .08s}
.pin-btn:active{background:var(--bg3);transform:scale(.95)}
.pin-btn.del{font-size:18px;color:var(--text2)}
#app{display:none;flex-direction:column;min-height:100vh}
#app.visible{display:flex}
.topbar{background:var(--bg);border-bottom:.5px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-title{font-size:15px;font-weight:600}
.topbar-sub{font-size:11px;color:var(--text2);margin-top:1px}
.topbar-right{display:flex;gap:10px;align-items:center}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text2);padding:4px;font-size:20px}
.drive-dot{width:8px;height:8px;border-radius:50%;background:#f59e0b}
.drive-dot.ok{background:var(--success)}
.week-bar{background:var(--bg);border-bottom:.5px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:8px}
.week-nav{background:none;border:.5px solid var(--border);border-radius:var(--r);padding:5px 12px;font-size:13px;cursor:pointer;color:var(--text)}
.week-label{flex:1;text-align:center;font-size:13px;font-weight:500}
.week-badge{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500}
.badge-open{background:var(--success-bg);color:var(--success)}
.badge-closed{background:var(--danger-bg);color:var(--danger)}
.retro-bar{background:var(--warning-bg);border-bottom:.5px solid var(--warning-border);padding:6px 14px;font-size:12px;color:var(--warning);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.retro-bar input[type=date]{font-size:12px;border:.5px solid var(--warning-border);border-radius:var(--r);padding:2px 6px;background:#fff}
.nav-tabs{display:flex;background:var(--bg);border-bottom:.5px solid var(--border);overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{flex:none;padding:10px 12px;font-size:12px;font-weight:500;color:var(--text2);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;transition:color .15s,border-color .15s}
.nav-tab.active{color:var(--text);border-bottom-color:var(--text)}
.content{flex:1;padding:12px 12px 80px}

/* DAY SELECTOR */
.day-card{background:var(--bg);border-radius:var(--rl);border:.5px solid var(--border);padding:14px;margin-bottom:12px}
.day-card-label{font-size:10px;font-weight:600;color:var(--text2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px}
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.day-col{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.day-name{font-size:11px;color:var(--text2);font-weight:500;padding:3px 0}
.day-name.active{color:var(--text);font-weight:700;border-bottom:2px solid var(--text)}
.toggle{position:relative;width:34px;height:19px;display:block}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.slider{position:absolute;inset:0;border-radius:99px;background:#d1d5db;transition:.2s;cursor:pointer}
.slider:before{content:'';position:absolute;width:15px;height:15px;left:2px;top:2px;border-radius:50%;background:#fff;transition:.2s}
.toggle input:checked+.slider{background:var(--success)}
.toggle input:checked+.slider:before{transform:translateX(15px)}
.day-status{font-size:9px;font-weight:600}
.st-open{color:var(--success)}
.st-closed{color:var(--danger)}
.day-hint{font-size:10px;color:var(--text3);margin-top:8px}

/* SECTIONS */
.section{background:var(--bg);border-radius:var(--rl);border:.5px solid var(--border);margin-bottom:12px;overflow:hidden}
.sec-hdr{background:var(--navy);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.sec-title{font-size:13px;font-weight:600;color:#fff;display:flex;align-items:center;gap:8px}
.sec-badge{font-size:10px;padding:2px 8px;border-radius:99px;background:rgba(255,255,255,.18);color:#fff;font-weight:600}
.sec-chev{color:rgba(255,255,255,.7);font-size:12px;transition:transform .2s}
.sec-chev.open{transform:rotate(180deg)}
.sec-body{padding:12px 14px}
.sec-body.hidden{display:none}

/* TEMP TABLE */
.temp-table{width:100%;border-collapse:collapse}
.temp-table th{font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:6px 6px;text-align:left;border-bottom:.5px solid var(--border)}
.temp-table td{padding:5px 6px;border-bottom:.5px solid var(--border);vertical-align:middle}
.temp-table tr:last-child td{border-bottom:none}
.unit-name{font-size:13px;font-weight:500;min-width:72px}
.temp-input{border:.5px solid var(--border);border-radius:var(--r);padding:5px 7px;font-size:13px;background:#fff;color:var(--text);width:75px;-moz-appearance:textfield}
.temp-input::-webkit-outer-spin-button,.temp-input::-webkit-inner-spin-button{-webkit-appearance:none}
.temp-input.alert{border-color:var(--danger);background:var(--danger-bg)}
.temp-input.ok{border-color:var(--success);background:var(--success-bg)}
.temp-feedback{font-size:10px;margin-top:3px;min-height:14px;display:block}
.temp-feedback.ok{color:var(--success)}
.temp-feedback.err{color:var(--danger)}
.ab{font-size:10px;color:var(--danger);display:none}
.ab.show{display:inline}

/* FOOD TABLE */
.food-table{width:100%;border-collapse:collapse}
.food-table th{font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:6px 6px;text-align:left;border-bottom:.5px solid var(--border)}
.food-table td{padding:5px 5px;border-bottom:.5px solid var(--border);vertical-align:middle}
.food-table tr:last-child td{border-bottom:none}
.fi{border:.5px solid var(--border);border-radius:var(--r);padding:5px 6px;font-size:12px;background:#fff;color:var(--text);width:100%;-moz-appearance:textfield}
.fi::-webkit-outer-spin-button,.fi::-webkit-inner-spin-button{-webkit-appearance:none}
.fi.alert{border-color:var(--danger);background:var(--danger-bg)}
.ti{border:.5px solid var(--border);border-radius:var(--r);padding:5px 4px;font-size:12px;background:#fff;color:var(--text);width:78px}

/* DELIVERY */
.del-hdr{display:grid;grid-template-columns:2fr 2fr 1fr 22px;gap:5px;margin-bottom:4px}
.del-hdr span{font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.del-row{display:grid;grid-template-columns:2fr 2fr 1fr 22px;gap:5px;margin-bottom:5px;align-items:center}
.di{border:.5px solid var(--border);border-radius:var(--r);padding:6px 7px;font-size:12px;width:100%;background:#fff;color:var(--text)}
.di.alert{border-color:var(--danger);background:var(--danger-bg)}
.di.di-ok{border-color:var(--success);background:var(--success-bg)}
.del-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;padding:2px}
.add-btn{border:.5px dashed var(--border2);background:none;border-radius:var(--r);padding:7px;font-size:12px;color:var(--text2);cursor:pointer;width:100%;margin-top:4px}
.add-btn:hover{background:var(--bg2)}
.cat-label{font-size:12px;font-weight:600;margin-bottom:6px;margin-top:14px;display:flex;align-items:center;gap:6px}
.cat-label:first-child{margin-top:0}
.cat-badge{font-size:10px;padding:1px 7px;border-radius:99px;background:var(--bg3);color:var(--text2);font-weight:500}

/* CHILL */
.chill-hdr{display:grid;grid-template-columns:2fr 1.2fr 1.2fr 22px;gap:5px;margin-bottom:4px}
.chill-hdr span{font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.chill-row{display:grid;grid-template-columns:2fr 1.2fr 1.2fr 22px;gap:5px;margin-bottom:6px;align-items:start}
.chill-cell{display:flex;flex-direction:column;gap:3px}

/* CHECKLIST */
.prog-wrap{background:var(--bg3);border-radius:99px;height:6px;margin-bottom:10px;overflow:hidden}
.prog-bar{height:100%;border-radius:99px;background:var(--success);transition:width .3s}
.prog-label{font-size:11px;color:var(--text2);margin-bottom:10px}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:.5px solid var(--border)}
.check-item:last-child{border-bottom:none}
.check-item input[type=checkbox]{width:17px;height:17px;margin-top:1px;flex-shrink:0;cursor:pointer;accent-color:var(--text)}
.check-item label{font-size:13px;line-height:1.4;cursor:pointer;flex:1}
.check-item.done label{color:var(--text2);text-decoration:line-through}

/* INSPECT */
.insp-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:.5px solid var(--border)}
.insp-item:last-child{border-bottom:none}
.insp-label{flex:1;font-size:12px;line-height:1.5}
.yn-btns{display:flex;gap:4px;flex-shrink:0}
.yn-btn{padding:4px 10px;border-radius:var(--r);border:.5px solid var(--border);font-size:11px;font-weight:600;cursor:pointer;background:none;color:var(--text2)}
.yn-btn.yes.active{background:var(--success-bg);color:var(--success);border-color:var(--success-border)}
.yn-btn.no.active{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-border)}

/* SUMMARY */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center;padding:14px}
.stat-num{font-size:22px;font-weight:700}
.stat-lbl{font-size:10px;color:var(--text2);margin-top:2px}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:.5px solid var(--border);font-size:12px;gap:8px}
.sum-row:last-child{border-bottom:none}
.sum-sel{font-size:11px;border:.5px solid var(--border);border-radius:var(--r);padding:3px 6px;background:#fff;color:var(--text)}

/* DOCS */
.doc-card{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:.5px solid var(--border);cursor:pointer;transition:background .15s}
.doc-card:hover{background:var(--bg2)}
.doc-card:last-child{border-bottom:none}
.doc-name{font-size:13px;font-weight:500}
.doc-sub{font-size:11px;color:var(--text2);margin-top:2px}

textarea{width:100%;border:.5px solid var(--border);border-radius:var(--r);padding:8px;font-size:12px;min-height:70px;background:#fff;color:var(--text);resize:vertical;font-family:inherit}
.staff-input{border:.5px solid var(--border);border-radius:var(--r);padding:7px 10px;font-size:13px;background:#fff;color:var(--text);width:100%;margin-bottom:10px}

.save-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:.5px solid var(--border);padding:10px 16px;display:flex;gap:8px;z-index:50}
.btn-primary{flex:1;background:var(--text);color:#fff;border:none;border-radius:var(--r);padding:11px;font-size:13px;font-weight:600;cursor:pointer}
.btn-primary:disabled{opacity:.5}
.btn-secondary{background:none;border:.5px solid var(--border2);border-radius:var(--r);padding:11px 14px;font-size:13px;cursor:pointer;color:var(--text)}
.close-card{background:var(--bg);border-radius:var(--rl);border:.5px solid var(--border);padding:14px;margin-bottom:12px}
.close-card h3{font-size:13px;font-weight:600;margin-bottom:6px}
.close-card p{font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.5}
.setting-item{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-bottom:.5px solid var(--border);gap:12px}
.setting-item:last-child{border-bottom:none}
.setting-label{font-size:13px;font-weight:500}
.setting-sub{font-size:11px;color:var(--text2);margin-top:2px}
.setting-item input,.setting-item select{border:.5px solid var(--border2);border-radius:var(--r);padding:5px 8px;font-size:13px;background:#fff;color:var(--text)}
.toast{position:fixed;bottom:74px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:9px 18px;border-radius:99px;font-size:12px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
.toast.show{opacity:1}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--bg);border-radius:var(--rl);padding:20px;width:100%;max-width:340px}
.modal-title{font-size:15px;font-weight:600;margin-bottom:6px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.6}
.modal-input{width:100%;margin-bottom:8px;border:.5px solid var(--border2);border-radius:var(--r);padding:8px 10px;font-size:13px}
.modal-btns{display:flex;gap:8px;margin-top:4px}
.modal-btns button{flex:1;padding:10px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer}
@media print{.save-bar,.nav-tabs,.week-bar,.topbar,.retro-bar,.day-card{display:none!important}.content{padding:0!important}}
</style>
</head>
<body>

<div id="pin-screen">
  <div class="pin-logo">Dolce Vita <span>Kitchen</span></div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-error" id="pin-error"></div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pp('1')">1</button><button class="pin-btn" onclick="pp('2')">2</button><button class="pin-btn" onclick="pp('3')">3</button>
    <button class="pin-btn" onclick="pp('4')">4</button><button class="pin-btn" onclick="pp('5')">5</button><button class="pin-btn" onclick="pp('6')">6</button>
    <button class="pin-btn" onclick="pp('7')">7</button><button class="pin-btn" onclick="pp('8')">8</button><button class="pin-btn" onclick="pp('9')">9</button>
    <button class="pin-btn del" onclick="pp('del')">⌫</button><button class="pin-btn" onclick="pp('0')">0</button><button class="pin-btn" style="visibility:hidden"></button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div><div class="topbar-title">Dolce Vita Kitchen</div><div class="topbar-sub">287 Beeston Road, Leeds</div></div>
    <div class="topbar-right">
      <div class="drive-dot" id="drive-dot"></div>
      <button class="icon-btn" onclick="window.print()">🖨</button>
      <button class="icon-btn" onclick="showTab('settings')">⚙️</button>
    </div>
  </div>
  <div class="week-bar">
    <button class="week-nav" onclick="changeWeek(-1)">‹ Prev</button>
    <div class="week-label" id="week-label">Week —</div>
    <span class="week-badge badge-open" id="week-badge">Open</span>
    <button class="week-nav" onclick="changeWeek(1)">Next ›</button>
  </div>
  <div class="retro-bar" id="retro-bar" style="display:none">
    🕐 Entering data for: <input type="date" id="retro-date" onchange="onRetroChange(this.value)">
    <button onclick="clearRetro()" style="margin-left:auto;background:none;border:none;cursor:pointer;color:var(--warning);font-size:12px;font-weight:600;">✕ Clear</button>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showTab('opening')">✅ Opening list</button>
    <button class="nav-tab" onclick="showTab('temps')">🌡 Temps &amp; Diligence</button>
    <button class="nav-tab" onclick="showTab('cleaning')">🧹 Cleaning</button>
    <button class="nav-tab" onclick="showTab('weekly')">📋 Weekly</button>
    <button class="nav-tab" onclick="showTab('summary')">📊 Summary</button>
    <button class="nav-tab" onclick="showTab('docs')">📁 Documents</button>
  </div>
  <div class="content" id="content"></div>
  <div class="save-bar">
    <button class="btn-secondary" onclick="toggleRetro()">📅 Past date</button>
    <button class="btn-secondary" onclick="loadFromSheet(weekKey())" style="flex:none;padding:11px 10px;">📥 Load</button>
    <button class="btn-primary" id="save-btn" onclick="saveData()">💾 Save</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="modal-overlay" id="drive-modal" style="display:none">
  <div class="modal-box">
    <div class="modal-title">Connect Google Drive</div>
    <div class="modal-sub">Paste your Google Sheet ID. Leave blank to register a new reference.</div>
    <input class="modal-input" type="text" id="sheet-id-input" placeholder="Sheet ID (optional)">
    <div class="modal-btns">
      <button style="background:none;border:.5px solid var(--border2);color:var(--text);" onclick="document.getElementById('drive-modal').style.display='none'">Cancel</button>
      <button style="background:var(--text);color:#fff;border:none;" onclick="connectDrive()">Connect</button>
    </div>
  </div>
</div>

<script>
let pin=localStorage.getItem('dv_pin')||'1234';
let entered='';let tab='opening';let weekOffset=0;let retroDate=null;
let closeDay=localStorage.getItem('dv_close_day')||'Wednesday';
let sheetId=localStorage.getItem('dv_sheet_id')||'';
let manager=localStorage.getItem('dv_manager')||'';
let data=JSON.parse(localStorage.getItem('dv_data')||'{}');
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function isoWeek(d){const dt=new Date(d);dt.setHours(0,0,0,0);dt.setDate(dt.getDate()+3-(dt.getDay()+6)%7);const w1=new Date(dt.getFullYear(),0,4);return 1+Math.round(((dt-w1)/86400000-3+(w1.getDay()+6)%7)/7);}
function today(){const b=new Date();b.setDate(b.getDate()+weekOffset*7);return b;}
function currentDay(){if(retroDate){const d=new Date(retroDate);return DAYS[(d.getDay()+6)%7];}return DAYS[(today().getDay()+6)%7];}
function weekKey(){if(retroDate){const d=new Date(retroDate);return 'W'+isoWeek(d)+'-'+d.getFullYear();}const d=today();return 'W'+isoWeek(d)+'-'+d.getFullYear();}
function get(key,def){const k=weekKey();if(!data[k])data[k]={};return data[k][key]!==undefined?data[k][key]:def;}
function set(key,val){const k=weekKey();if(!data[k])data[k]={};data[k][key]=val;localStorage.setItem('dv_data',JSON.stringify(data));}

function pp(v){
  if(v==='del')entered=entered.slice(0,-1);
  else if(entered.length<4)entered+=v;
  for(let i=0;i<4;i++)document.getElementById('d'+i).classList.toggle('filled',i<entered.length);
  if(entered.length===4){
    if(entered===pin){
      document.getElementById('pin-screen').style.display='none';
      document.getElementById('app').classList.add('visible');
      updateWeekLabel();render();updateDriveDot();
      // Auto-load current week from Sheet
      loadFromSheet(weekKey());
    }
    else{document.getElementById('pin-error').textContent='Incorrect PIN';setTimeout(()=>{entered='';for(let i=0;i<4;i++)document.getElementById('d'+i).classList.remove('filled');document.getElementById('pin-error').textContent='';},900);}
  }
}

function changeWeek(dir){weekOffset+=dir;updateWeekLabel();render();}
function updateWeekLabel(){
  const d=today();const wn=isoWeek(d);const day=(d.getDay()+6)%7;
  const mon=new Date(d);mon.setDate(d.getDate()-day);const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const fmt=dt=>dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
  document.getElementById('week-label').textContent='Week '+wn+' · '+fmt(mon)+' – '+fmt(sun);
  const closed=data[weekKey()]&&data[weekKey()]['_closed'];
  const badge=document.getElementById('week-badge');badge.textContent=closed?'Closed':'Open';badge.className='week-badge '+(closed?'badge-closed':'badge-open');
}
function toggleRetro(){const bar=document.getElementById('retro-bar');if(bar.style.display==='none'){bar.style.display='flex';document.getElementById('retro-date').value=new Date().toISOString().slice(0,10);onRetroChange(document.getElementById('retro-date').value);}else clearRetro();}

function daySelector(){
  const cur=currentDay();
  let h=`<div class="day-card"><div class="day-card-label">Select day</div><div class="day-grid">`;
  DAYS.forEach((d,i)=>{
    const active=d===cur;const closed=get('day_closed_'+d,false);
    h+=`<div class="day-col" onclick="selectDay('${d}')">
      <div class="day-name ${active?'active':''}">${d}</div>
      <label class="toggle" onclick="event.stopPropagation()">
        <input type="checkbox" id="tog_${d}" ${!closed?'checked':''} onchange="toggleDay('${d}',this.checked)">
        <span class="slider"></span>
      </label>
      <div class="day-status ${closed?'st-closed':'st-open'}" id="dstl_${d}">${closed?'Closed':'Open'}</div>
    </div>`;
  });
  h+=`</div><div class="day-hint">Tap day name to select · Toggle Open / Closed</div></div>`;
  return h;
}
function selectDay(d){
  const wkStart=new Date(today());const dow=(wkStart.getDay()+6)%7;
  wkStart.setDate(wkStart.getDate()-dow+DAYS.indexOf(d));
  retroDate=wkStart.toISOString().slice(0,10);
  document.getElementById('retro-bar').style.display='flex';
  document.getElementById('retro-date').value=retroDate;render();
}
function toggleDay(day,open){
  set('day_closed_'+day,!open);
  const lbl=document.getElementById('dstl_'+day);
  if(lbl){lbl.textContent=open?'Open':'Closed';lbl.className='day-status '+(open?'st-open':'st-closed');}
}

function tempFeedback(val, thresh){
  if(val==='') return '<span class="temp-feedback"></span>';
  const v=parseFloat(val);
  if(v>thresh) return `<span class="temp-feedback err">▲ Too warm — check unit</span>`;
  return `<span class="temp-feedback ok">✓ Within range</span>`;
}

function fridgeTable(units,day,thresh,dir){
  let h=`<table class="temp-table"><tr><th>Unit</th><th>AM °C</th><th>PM °C</th></tr>`;

    h+=`<tr><td class="unit-name">${u}</td>

function calcFridgeFreeze(){
  // Check all fridge and freezer AM/PM values — alert if any entered value is out of range
  let hasData=false, hasIssue=false;
  FRIDGES.forEach(u=>{
    DAYS.forEach(d=>{
      const av=get(u+'_'+d+'_AM',''), pv=get(u+'_'+d+'_PM','');
      if(av!==''){hasData=true; if(parseFloat(av)>5)hasIssue=true;}
      if(pv!==''){hasData=true; if(parseFloat(pv)>5)hasIssue=true;}
    });
  });
  FREEZERS.forEach(u=>{
    DAYS.forEach(d=>{
      const av=get(u+'_'+d+'_AM',''), pv=get(u+'_'+d+'_PM','');
      if(av!==''){hasData=true; if(parseFloat(av)>-18)hasIssue=true;}
      if(pv!==''){hasData=true; if(parseFloat(pv)>-18)hasIssue=true;}
    });
  });
  if(!hasData) return 'pending';
  return hasIssue ? 'issues' : 'pass';
}

function calcDelivery(){
  let hasData=false, hasIssue=false;
  DAYS.forEach(d=>{
    const ch=get('del_chilled_'+d,[]);
    const fr=get('del_frozen_'+d,[]);
    ch.forEach(r=>{if(r[2]!==''){hasData=true; if(parseFloat(r[2])>5)hasIssue=true;}});
    fr.forEach(r=>{if(r[2]!==''){hasData=true; if(parseFloat(r[2])>-18)hasIssue=true;}});
  });
  if(!hasData) return 'pending';
  return hasIssue ? 'issues' : 'pass';
}

function calcHotHolding(){
  let hasData=false, hasIssue=false;
  DAYS.forEach(d=>{
    const rows=get('hh_'+d,[]);
    rows.forEach(r=>{if((r[2]||'')!==''){hasData=true; if(parseFloat(r[2])<63)hasIssue=true;}});
  });
  if(!hasData) return 'pending';
  return hasIssue ? 'issues' : 'pass';
}

function calcCooking(){
  let hasData=false, hasIssue=false;
  DAYS.forEach(d=>{
    const names=get('cook_names_'+d,[...DEFAULT_COOK]);
    names.forEach((_,i)=>{
      const v=get('ct_temp_'+i+'_'+d,'');
      if(v!==''){hasData=true; if(parseFloat(v)<75)hasIssue=true;}
    });
  });
  if(!hasData) return 'pending';
  return hasIssue ? 'issues' : 'pass';
}

function calcOpeningDay(d){
  const closed=get('day_closed_'+d,false);
  if(closed) return null; // skip closed days
  const total=OPENING_ITEMS.length;
  const done=OPENING_ITEMS.filter((_,i)=>get('open_'+d+'_'+i,false)).length;
  if(done===0) return 'pending';
  return done===total ? 'pass' : 'issues';
}

function calcOpening(){
  const results=DAYS.map(d=>calcOpeningDay(d)).filter(r=>r!==null);
  if(results.every(r=>r==='pending')) return 'pending';
  if(results.some(r=>r==='issues')) return 'issues';
  return 'pass';
}

function calcCleaningFOH(){
  let anyData=false, anyIssue=false;
  DAYS.forEach(d=>{
    const closed=get('day_closed_'+d,false);
    if(closed) return;
    const done=FOH.filter((_,i)=>get('foh_'+d+'_'+i,false)).length;
    if(done>0) anyData=true;
    if(done>0 && done<FOH.length) anyIssue=true;
  });
  if(!anyData) return 'pending';
  return anyIssue ? 'issues' : 'pass';
}

function calcCleaningBOH(){
  let anyData=false, anyIssue=false;
  DAYS.forEach(d=>{
    const closed=get('day_closed_'+d,false);
    if(closed) return;
    const done=BOH.filter((_,i)=>get('boh_'+d+'_'+i,false)).length;
    if(done>0) anyData=true;
    if(done>0 && done<BOH.length) anyIssue=true;
  });
  if(!anyData) return 'pending';
  return anyIssue ? 'issues' : 'pass';
}

function calcWeeklyInspection(){
  const answered=INSPECT.filter((_,i)=>get('insp_'+i,null)!==null).length;
  if(answered===0) return 'pending';
  return answered===INSPECT.length ? 'pass' : 'issues';
}

function statusPill(s){
  if(s==='pass') return `<span style="font-size:11px;padding:2px 10px;border-radius:99px;background:var(--success-bg);color:var(--success);font-weight:600;">✓ Pass</span>`;
  if(s==='issues') return `<span style="font-size:11px;padding:2px 10px;border-radius:99px;background:var(--warning-bg);color:var(--warning);font-weight:600;">⚠ Issues</span>`;
  if(s==='fail') return `<span style="font-size:11px;padding:2px 10px;border-radius:99px;background:var(--danger-bg);color:var(--danger);font-weight:600;">✕ Fail</span>`;
  return `<span style="font-size:11px;padding:2px 10px;border-radius:99px;background:var(--bg3);color:var(--text2);font-weight:600;">— Pending</span>`;
}

function renderSummary(){
  const checks=[
    {label:'🌡 Fridge & Freezer temps', status: calcFridgeFreeze()},
    {label:'🚚 Delivery checks', status: calcDelivery()},
    {label:'🍳 Cooking & reheating', status: calcCooking()},
    {label:'♨ Hot holding', status: calcHotHolding()},
    {label:'✅ Opening list', status: calcOpening()},
    {label:'🧹 Cleaning FOH', status: calcCleaningFOH()},
    {label:'🧹 Cleaning BOH', status: calcCleaningBOH()},
    {label:'📋 Weekly inspection', status: calcWeeklyInspection()},
  ];

  const pass=checks.filter(c=>c.status==='pass').length;
  const issues=checks.filter(c=>c.status==='issues').length;
  const fail=checks.filter(c=>c.status==='fail').length;
  const done=checks.filter(c=>c.status!=='pending').length;
  const pct=done===0?0:Math.round(pass/checks.length*100);

  let h=`<div class="section" style="margin-bottom:12px;"><div class="stat-grid">
    <div><div class="stat-num">${pct}%</div><div class="stat-lbl">Compliance</div></div>
    <div><div class="stat-num" style="color:var(--success)">${pass}</div><div class="stat-lbl">Pass</div></div>
    <div><div class="stat-num" style="color:var(--warning)">${issues}</div><div class="stat-lbl">Issues</div></div>
    <div><div class="stat-num" style="color:var(--danger)">${fail}</div><div class="stat-lbl">Fail</div></div>
  </div></div>`;

  h+=`<div class="section"><div class="sec-hdr" style="cursor:default"><div class="sec-title">📊 Compliance summary — auto calculated</div></div><div class="sec-body">`;
  checks.forEach(c=>{
    h+=`<div class="sum-row"><span style="flex:1;font-size:13px;">${c.label}</span>${statusPill(c.status)}</div>`;
  });
  h+=`<textarea data-key="sum_notes" style="margin-top:12px;" placeholder="Manager notes / actions...">${get('sum_notes','')}</textarea>`;
  h+=`</div></div>`;
  return h;
}

// ── DOCUMENTS ─────────────────────────────────────────────────────────
function renderDocs(){
  const docs=JSON.parse(localStorage.getItem('dv_docs')||'[]');
  let h='<div class="section">';
  if(!docs.length){h+=`<div style="padding:32px 16px;text-align:center;color:var(--text2);"><div style="font-size:36px;margin-bottom:8px;">📁</div><div style="font-size:13px;">No documents yet.<br>Add your Google Drive PDF links below.</div></div>`;}
  else{docs.forEach((doc,i)=>{h+=`<div class="doc-card" onclick="window.open('${doc.url}','_blank')"><div style="font-size:24px;color:var(--danger);">📄</div><div style="flex:1"><div class="doc-name">${doc.name}</div><div class="doc-sub">${doc.desc||'Tap to open'}</div></div><button onclick="event.stopPropagation();removeDoc(${i})" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;">✕</button></div>`;});}
  h+=`</div><div class="section" style="padding:14px;margin-top:12px;"><div style="font-size:13px;font-weight:600;margin-bottom:10px;">Add document from Drive</div>
    <input type="text" id="doc-name" placeholder="Name (e.g. Allergy Book)" style="width:100%;margin-bottom:8px;border:.5px solid var(--border2);border-radius:var(--r);padding:7px 10px;font-size:13px;">
    <input type="text" id="doc-url" placeholder="Google Drive share link" style="width:100%;margin-bottom:8px;border:.5px solid var(--border2);border-radius:var(--r);padding:7px 10px;font-size:13px;">
    <input type="text" id="doc-desc" placeholder="Description (optional)" style="width:100%;margin-bottom:12px;border:.5px solid var(--border2);border-radius:var(--r);padding:7px 10px;font-size:13px;">
    <button class="btn-primary" onclick="addDoc()" style="width:100%;">Add document</button></div>`;
  return h;
}
function addDoc(){const n=document.getElementById('doc-name').value.trim();const u=document.getElementById('doc-url').value.trim();const d=document.getElementById('doc-desc').value.trim();if(!n||!u){toast('Enter name and URL');return;}const docs=JSON.parse(localStorage.getItem('dv_docs')||'[]');docs.push({name:n,url:u,desc:d});localStorage.setItem('dv_docs',JSON.stringify(docs));render();toast('Document added ✓');}
function removeDoc(i){const docs=JSON.parse(localStorage.getItem('dv_docs')||'[]');docs.splice(i,1);localStorage.setItem('dv_docs',JSON.stringify(docs));render();}

// ── SETTINGS ──────────────────────────────────────────────────────────
function renderSettings(){
  return `<div class="section">
    <div class="setting-item"><div><div class="setting-label">PIN code</div><div class="setting-sub">4-digit access code</div></div><div style="display:flex;gap:6px;"><input type="password" id="new-pin" maxlength="4" placeholder="New PIN" style="width:80px;"><button class="btn-secondary" onclick="changePin()" style="font-size:12px;padding:6px 10px;">Save</button></div></div>
    <div class="setting-item"><div><div class="setting-label">Week closing day</div></div><select onchange="closeDay=this.value;localStorage.setItem('dv_close_day',this.value);toast('Saved ✓')">${['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].map(d=>`<option ${closeDay===d?'selected':''}>${d}</option>`).join('')}</select></div>
    <div class="setting-item"><div><div class="setting-label">Default FOH staff</div></div><input type="text" value="${localStorage.getItem('dv_foh_name')||'Vita Rabcheniuk'}" style="width:160px;" oninput="localStorage.setItem('dv_foh_name',this.value)"></div>
    <div class="setting-item"><div><div class="setting-label">Default BOH staff</div></div><input type="text" value="${localStorage.getItem('dv_boh_name')||'Luigi Buongiorno'}" style="width:160px;" oninput="localStorage.setItem('dv_boh_name',this.value)"></div>
    <div class="setting-item"><div><div class="setting-label">Manager name</div></div><input type="text" value="${manager}" placeholder="Name" style="width:160px;" oninput="manager=this.value;localStorage.setItem('dv_manager',this.value)"></div>
    <div class="setting-item"><div><div class="setting-label">Google Sheet</div><div class="setting-sub">${sheetId?'ID: '+sheetId.slice(0,14)+'…':'Not connected'}</div></div><button class="btn-secondary" onclick="document.getElementById('drive-modal').style.display='flex'" style="font-size:12px;padding:6px 10px;">${sheetId?'Change':'Connect'}</button></div>
    <div class="setting-item"><div><div class="setting-label">Export this week</div></div><button class="btn-secondary" onclick="exportData()" style="font-size:12px;padding:6px 10px;">Export JSON</button></div>
    <div class="setting-item"><div><div class="setting-label">Lock app</div></div><button class="btn-secondary" onclick="lockApp()" style="font-size:12px;padding:6px 10px;color:var(--danger);border-color:var(--danger);">Lock</button></div>
  </div>`;
}
function changePin(){const np=document.getElementById('new-pin').value;if(np.length!==4||isNaN(np)){toast('PIN must be 4 digits');return;}pin=np;localStorage.setItem('dv_pin',np);toast('PIN updated ✓');}
function exportData(){const blob=new Blob([JSON.stringify({week:weekKey(),manager,data:data[weekKey()]||{}},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='dolcevita_'+weekKey()+'.json';a.click();}
function lockApp(){document.getElementById('app').classList.remove('visible');document.getElementById('pin-screen').style.display='flex';entered='';for(let i=0;i<4;i++)document.getElementById('d'+i).classList.remove('filled');}
function connectDrive(){const id=document.getElementById('sheet-id-input').value.trim();sheetId=id||'dv_'+Date.now();localStorage.setItem('dv_sheet_id',sheetId);document.getElementById('drive-modal').style.display='none';updateDriveDot();toast('Google Drive connected ✓');}
function updateDriveDot(){document.getElementById('drive-dot').className='drive-dot ok';}
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbw2ntDlQDovFkdazBtZ6i4WXVl9tsIyQWat8H0v4PdNj9-hxNLJsmaGgCAhloJuDhy5KA/exec';

async function loadFromSheet(wk){
  try {
    const url=SCRIPT_URL+'?action=load&week='+encodeURIComponent(wk);
    const resp=await fetch(url);
    const result=await resp.json();
    if(result.status==='ok'&&result.data&&Object.keys(result.data).length>0){
      data[wk]=result.data;
      localStorage.setItem('dv_data',JSON.stringify(data));
      toast('✓ Data loaded from Google Sheet');
      render();
      return true;
    }
  } catch(e){}
  return false;
}

async function saveData(){
  const wk=weekKey();
  const localEntries=Object.keys(data[wk]||{}).filter(k=>!k.startsWith('_')).length;
  if(localEntries===0){
    toast('⚠ No data to save — fill in some fields first');
    return;
  }
  if(!confirm('Save week '+wk+' to Google Sheet?\nThis will overwrite existing sheet data.')){return;}
  localStorage.setItem('dv_data',JSON.stringify(data));
  const btn=document.getElementById('save-btn');
  btn.textContent='Saving…';btn.disabled=true;
  try {
    const payload={week:wk, manager, data:data[wk]||{}};
    const resp=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(payload)});
    const result=await resp.json();
    if(result.status==='ok'){
      document.getElementById('drive-dot').className='drive-dot ok';
      toast('✓ Saved to Google Sheet — '+wk);
    } else {
      toast('⚠ Sheet error: '+result.message);
    }
  } catch(err){
    toast('Saved locally — check internet connection');
    document.getElementById('drive-dot').className='drive-dot';
  }
  btn.textContent='Save to Google Sheet';btn.disabled=false;
}

// ── BIND ──────────────────────────────────────────────────────────────
function bindAll(){
  document.querySelectorAll('[data-key]').forEach(el=>{
    const save=()=>{const type=el.dataset.type;set(el.dataset.key,type==='check'?el.checked:el.value);if(type==='check')render();};
    el.addEventListener('change',save);
    if(el.tagName!=='SELECT'&&el.type!=='checkbox')el.addEventListener('input',()=>set(el.dataset.key,el.value));
    if(el.type==='number'){
      const thresh=el.dataset.thresh!==undefined?parseFloat(el.dataset.thresh):null;
      const dir=el.dataset.dir!==undefined?parseInt(el.dataset.dir):1;
      const min=el.dataset.min!==undefined?parseFloat(el.dataset.min):null;
      el.addEventListener('input',()=>{
        set(el.dataset.key,el.value);
        const v=parseFloat(el.value);
        const nx=el.nextElementSibling;
        if(thresh!==null&&el.value!==''){
          const over=v>thresh;
          el.classList.toggle('alert',over);
          el.classList.toggle('ok',!over);
          const fb=el.nextElementSibling&&el.nextElementSibling.tagName==='BR'?el.nextElementSibling.nextElementSibling:null;
          if(fb&&fb.classList.contains('temp-feedback')){
            fb.textContent=over?'▲ Too warm — check unit':'✓ Within range';
            fb.className='temp-feedback '+(over?'err':'ok');
          }
        } else if(thresh!==null&&el.value===''){
          el.classList.remove('alert','ok');
          const fb=el.nextElementSibling&&el.nextElementSibling.tagName==='BR'?el.nextElementSibling.nextElementSibling:null;
          if(fb&&fb.classList.contains('temp-feedback')){fb.textContent='';fb.className='temp-feedback';}
        }
        if(min!==null&&el.value!==''){
          const under=v<min;
          el.classList.toggle('alert',under);
          if(nx&&nx.classList.contains('ab'))nx.classList.toggle('show',under);
        }
      });
    }
  });

  // delivery
  document.querySelectorAll('[data-dc]').forEach(el=>{
    el.addEventListener('change',()=>{
      const cat=el.dataset.dc,r=parseInt(el.dataset.dr),c=parseInt(el.dataset.dcc);
      const rows=get(cat,[]);if(!rows[r])rows[r]=['','',''];rows[r][c]=el.value;set(cat,rows);
    });
    // live alert for temp column
    if(el.dataset.delthresh!==undefined){
      el.addEventListener('input',()=>{
        const thresh=parseFloat(el.dataset.delthresh);
        const v=parseFloat(el.value);
        const over=el.value!==''&&v>thresh;
        const ok=el.value!==''&&!over;
        el.classList.toggle('alert',over);
        el.classList.toggle('di-ok',ok);
        const fb=el.parentElement.querySelector('span');
        if(fb){
          fb.textContent=over?'▲ Too warm':'✓ OK';
          fb.style.color=over?'var(--danger)':'var(--success)';
          fb.style.display=el.value!==''?'inline':'none';
        }
      });
    }
  });

  // hot holding
  document.querySelectorAll('[data-hh]').forEach(el=>{
    el.addEventListener('change',()=>{
      const day=el.dataset.hh,r=parseInt(el.dataset.hr),c=parseInt(el.dataset.hc);
      const rows=get('hh_'+day,[]);if(!rows[r])rows[r]=['','',''];rows[r][c]=el.value;set('hh_'+day,rows);
    });
  });

  // chilling
  document.querySelectorAll('[data-chill]').forEach(el=>{
    el.addEventListener('change',()=>{
      const day=el.dataset.chill,i=parseInt(el.dataset.ci),field=el.dataset.cf;
      const rows=get('chill_'+day,[]);if(!rows[i])rows[i]={item:'',st:'',stime:'',et:'',etime:''};rows[i][field]=el.value;set('chill_'+day,rows);
    });
  });

  // cooking item names
  document.querySelectorAll('[data-cook-name]').forEach(el=>{
    el.addEventListener('change',()=>{
      const day=el.dataset.cookName,idx=parseInt(el.dataset.cookIdx);
      const names=get('cook_names_'+day,[...DEFAULT_COOK]);
      names[idx]=el.value;set('cook_names_'+day,names);
    });
  });
}
